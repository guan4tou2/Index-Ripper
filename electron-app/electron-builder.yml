appId: com.indexripper.app
productName: Index Ripper
directories:
  buildResources: resources
  output: dist
asar: true
compression: maximum
files:
  - out/**/*
  - "!out/**/*.map"
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{tsconfig*.json,vitest.config.ts,components.json}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}"
  - "!{CHANGELOG.md,README.md,LICENSE}"
win:
  target:
    - target: dir
      arch: [x64]
  icon: resources/icon.png
mac:
  target:
    - target: dir
      arch: [universal]
  icon: resources/icon.png
  category: public.app-category.utilities
linux:
  target:
    - target: dir
      arch: [x64]
  icon: resources/icon.png
  category: Utility
