name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Python tests
  # -----------------------------------------------------------------------
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: Run unit tests (exclude UI smoke tests that need display)
        run: uv run python -m pytest tests/ -v --ignore=tests/test_app_smoke.py

  # -----------------------------------------------------------------------
  # Electron tests
  # -----------------------------------------------------------------------
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - run: npm ci
      - run: npx vitest run

  # -----------------------------------------------------------------------
  # Electron build (all platforms)
  # -----------------------------------------------------------------------
  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: test-electron
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_name: IndexRipper-Windows
            zip_name: IndexRipper-Windows-x64
            dir_name: win-unpacked
          - os: macos-14
            build_cmd: npm run build:mac
            artifact_name: IndexRipper-macOS
            zip_name: IndexRipper-macOS-universal
            dir_name: mac-universal
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_name: IndexRipper-Linux
            zip_name: IndexRipper-Linux-x64
            dir_name: linux-unpacked
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Package portable zip
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            # macOS dir target outputs .app bundle inside mac-universal/
            zip -r -y "${{ matrix.zip_name }}.zip" "${{ matrix.dir_name }}/Index Ripper.app"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            cd "${{ matrix.dir_name }}"
            7z a -tzip "../${{ matrix.zip_name }}.zip" .
          else
            cd "${{ matrix.dir_name }}"
            zip -r -y "../${{ matrix.zip_name }}.zip" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: electron-app/dist/${{ matrix.zip_name }}.zip
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Release (on tag push only)
  # -----------------------------------------------------------------------
  release:
    name: Release
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
