name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run python -m pytest test_backend.py test_app_utils.py test_settings_store.py test_security_utils.py test_ui_theme.py test_ui_downloads.py -v

  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, macos-14, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: IndexRipper-Windows
            output_path: dist/IndexRipper.exe
          - os: macos-13
            artifact_name: IndexRipper-macOS-Intel
            output_path: dist/IndexRipper.app
          - os: macos-14
            artifact_name: IndexRipper-macOS-AppleSilicon
            output_path: dist/IndexRipper.app
          - os: ubuntu-latest
            artifact_name: IndexRipper-Linux
            output_path: dist/IndexRipper
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv run pyinstaller --onefile --windowed --icon=app.png --name=IndexRipper --collect-all customtkinter index_ripper.py

      - name: Build (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          uv run pyinstaller -F --windowed --name=IndexRipper \
            --collect-all customtkinter --icon=app.png index_ripper.py
          [ -f dist/IndexRipper ] && rm -f dist/IndexRipper || true

      - name: Sign app (ad-hoc)
        if: startsWith(matrix.os, 'macos-')
        run: |
          codesign --force --deep --sign - "dist/IndexRipper.app"

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller --onefile --windowed --name=IndexRipper \
            --collect-all customtkinter --icon=app.png index_ripper.py

      - name: Verify artifact exists
        shell: bash
        run: |
          echo "Listing dist/:" && ls -la dist || true
          if [ -d "${{ matrix.output_path }}" ] || [ -f "${{ matrix.output_path }}" ]; then
            echo "Artifact exists: ${{ matrix.output_path }}"
          else
            echo "Artifact not found: ${{ matrix.output_path }}" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Ensure zip is available
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip

      - name: Zip macOS apps
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          (
            cd artifacts
            for dir in IndexRipper-macOS-*; do
              [ -d "$dir" ] || continue
              zip_name="${dir}.app.zip"
              app_src=""
              if [ -d "$dir/IndexRipper.app" ]; then
                app_src="$dir/IndexRipper.app"
              elif [ -d "$dir/dist/IndexRipper.app" ]; then
                app_src="$dir/dist/IndexRipper.app"
              elif [ -d "$dir/Contents" ]; then
                rm -rf "$dir/_pkg"
                mkdir -p "$dir/_pkg/IndexRipper.app"
                shopt -s dotglob nullglob
                for item in "$dir"/*; do
                  base="$(basename "$item")"
                  [ "$base" = "_pkg" ] && continue
                  mv "$item" "$dir/_pkg/IndexRipper.app/"
                done
                shopt -u dotglob nullglob
                app_src="$dir/_pkg/IndexRipper.app"
              fi

              if [ -n "$app_src" ] && [ -d "$app_src" ]; then
                zip_out_path="$(pwd)/$zip_name"
                app_parent="$(dirname "$app_src")"
                (
                  cd "$app_parent"
                  echo "Zipping IndexRipper.app from $(pwd) -> $zip_out_path"
                  zip -r -9 "$zip_out_path" "IndexRipper.app"
                )
              else
                echo "No macOS app bundle found in $dir, skipping"
              fi
            done
          )

      - name: Normalize asset filenames
        shell: bash
        run: |
          set -euo pipefail
          if [ -f artifacts/IndexRipper-Windows/IndexRipper.exe ]; then
            mv artifacts/IndexRipper-Windows/IndexRipper.exe artifacts/IndexRipper-Windows.exe
          fi
          if [ -f artifacts/IndexRipper-Linux/IndexRipper ]; then
            mv artifacts/IndexRipper-Linux/IndexRipper artifacts/IndexRipper-Linux.bin
          fi

      - name: List prepared files
        run: |
          echo "Artifacts tree:" && ls -laR artifacts || true
          echo "macOS zips:" && ls -la artifacts/*.app.zip || true
          echo "Windows exe:" && ls -la artifacts/*.exe || true
          echo "Linux bin:" && ls -la artifacts/*.bin || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/IndexRipper-Windows.exe
            artifacts/IndexRipper-Linux.bin
            artifacts/IndexRipper-macOS-*.app.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
