name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Python tests
  # -----------------------------------------------------------------------
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - run: uv run python -m pytest tests/ -v

  # -----------------------------------------------------------------------
  # Electron tests
  # -----------------------------------------------------------------------
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json
      - run: npm ci
      - run: npx vitest run

  # -----------------------------------------------------------------------
  # Electron build (all platforms)
  # -----------------------------------------------------------------------
  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: [test-python, test-electron]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_name: IndexRipper-Windows
            artifact_glob: "electron-app/dist/*.exe"
          - os: macos-14
            build_cmd: npm run build:mac
            artifact_name: IndexRipper-macOS
            artifact_glob: "electron-app/dist/*.dmg"
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_name: IndexRipper-Linux
            artifact_glob: "electron-app/dist/*.AppImage"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Release (on tag push only)
  # -----------------------------------------------------------------------
  release:
    name: Release
    needs: build-electron
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
